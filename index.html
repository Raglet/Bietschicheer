<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./images/favicon.svg" />

    <!-- Add Material Design -->
    <link
      href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <title>Gelände Bietschicheer</title>
  </head>

  <body>
    <a href="lineup.html" id="liveBanner" class="live-banner" hidden>
      <span class="live-banner__dot"></span>
      <span class="live-banner__text"></span>
    </a>

    <div id="map"></div>
    <img
      class="brand-logo"
      src="images/bietschicheer/Bietschicheer_26_logo_sekundär.png"
      alt="Bietschicheer"
    />
    <button
      id="mapButton"
      aria-label="question_mark"
    >
      <span class="material-icons" style="font-size:24px;">question_mark</span>
    </button>

    <a href="bietschimeile.html" id="bietschimeileButton" aria-label="Bietschimeile">
      <img src="icons/bietschimeile.png" alt="Bietschimeile" />
    </a>

    <a href="bietschimeile.html" class="meile-hint" id="meileHint">
      <span class="meile-hint__text">Kännsch scho die Bietschimeile?</span>
      <span
        class="meile-hint__close"
        id="meileHintClose"
        role="button"
        aria-label="Hinweis schliessen"
        >×</span
      >
    </a>

    <button id="locateButton" aria-label="Standort anzeigen">
      <span class="material-icons" style="font-size:24px;">my_location</span>
    </button>

    <div
      class="mdc-dialog"
      id="settingsDialog"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="dialog-title"
      aria-describedby="dialog-content"
    >
      <div class="mdc-dialog__container">
        <div class="mdc-dialog__surface">
          <div class="mdc-dialog__content" id="dialog-content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">local_bar</span>
              <span style="text-align: center; margin-left: 10px;">z'Laffu</span>
            </p>
          </div>  <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">lunch_dining</span>
              <span style="margin-left: 10px;">Habbär</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">attractions</span>
              <span style="margin-left: 10px;">Namittagsprogramm</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">restaurant</span>
              <span style="margin-left: 10px;">Restaurant</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">wc</span>
              <span style="margin-left: 10px;">Bierrückgab</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">local_atm</span>
              <span style="margin-left: 10px;">Cash</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">info</span>
              <span style="margin-left: 10px;">Infostand </br>& Tiggetvercheuf</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">local_parking</span>
              <span style="margin-left: 10px;">Parkplatz</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span class="mdc-icon-button material-icons">medical_services</span>
              <span style="margin-left: 10px;">Sanität</span>
            </p>
          </div>

          <div class="mdc-dialog__content">
            <p style="display: flex; align-items: center;">
              <span >
              <span class="material-icons" style="margin-left: 10px;" >train</span>
              <span style="margin-right: 10px;"class=" material-icons">directions_bus</span>
            </span>
              <span style="margin-left: 10px;">ÖV Stop</span>
            </p>
          </div>

          <footer class="mdc-dialog__actions">
            <button
              type="button"
              class="mdc-button mdc-dialog__button"
              data-mdc-dialog-action="close"
            >
              Schliessen
            </button>
          </footer>
        </div>
      </div>
      <div class="mdc-dialog__scrim"></div>
    </div>

    <script src="locations-data.js"></script>
    <script src="lineup-data.js"></script>
    <script src="script.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCXJdwDBQfk1lCSww2v3pM9ApCxynbKMoQ&v=beta&callback=initMap"></script>
  </body>
</html>
